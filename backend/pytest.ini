[pytest]
# Limit test collection to ``tests/``. Without this, pytest's default
# collection picks up ``test_*.py`` files anywhere under ``backend/`` —
# including ``brain/*/scratch/test_*.py`` debugging scripts that import
# modules unavailable on CI (e.g. ``mcp_server``) and break collection
# entirely. ``tests/`` is the canonical home for the real suite.
testpaths = tests
