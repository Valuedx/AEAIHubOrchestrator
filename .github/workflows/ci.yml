name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt
        working-directory: backend

      - name: Run backend unit tests (no-DB)
        # Full suite minus:
        #   * tests/integration/ — these need Docker + Postgres (run in the
        #     integration job below).
        #   * test_memory_api.py / test_memory_service.py /
        #     test_node_handlers_memory.py — require a live Postgres fixture
        #     (tracked under S1-12; once ported to integration/ drop these
        #     ignores).
        run: >-
          python -m pytest
          --ignore=tests/integration
          --ignore=tests/test_memory_api.py
          --ignore=tests/test_memory_service.py
          --ignore=tests/test_node_handlers_memory.py
          -v
        working-directory: backend

  backend-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt
        working-directory: backend

      - name: Run backend integration tests (Docker + Postgres via testcontainers)
        # The fixtures in tests/integration/conftest.py spin up a pgvector
        # container, run alembic upgrade head, and provision a non-superuser
        # role so RLS actually enforces. Auto-skips if Docker is missing.
        run: python -m pytest tests/integration/ -v
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Typecheck + build frontend
        run: npm run build
        working-directory: frontend
